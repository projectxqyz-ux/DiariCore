<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - DiariCore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="login.css" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <!-- Left Side - Welcome Back -->
        <div class="login-left">
            <div class="logo-section">
                <img src="dclogo.jfif" alt="DiariCore Logo" class="login-logo">
            </div>
            <div class="welcome-content">
                <h1 class="welcome-title">Welcome Back!</h1>
                <p class="welcome-text">To stay connected with DiariCore, login with your personal info.</p>
                <button class="btn-signup" id="showSignUpBtn">SIGN UP</button>
            </div>
        </div>
        
        <!-- Right Side - Sign In Form -->
        <div class="login-right">
            <div class="form-container">
                <!-- Logo Icon -->
                <div class="form-logo">
                    <img src="dclogo.jfif" alt="DiariCore" class="form-logo-img">
                </div>
                
                <h2 class="form-title">Sign In to DiariCore</h2>
                <p class="form-subtitle">Continue your journaling journey with mindful insights.</p>
                
                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <div class="input-wrapper">
                            <input 
                                type="email" 
                                id="email" 
                                class="form-input" 
                                placeholder="Email"
                                required
                            >
                            <i class="bi bi-envelope input-icon"></i>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <div class="input-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                class="form-input" 
                                placeholder="Password"
                                required
                            >
                            <i class="bi bi-eye-slash input-icon toggle-password" id="togglePassword"></i>
                        </div>
                    </div>
                    
                    <div class="form-options">
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>
                    
                    <button type="submit" class="btn-signin">SIGN IN</button>
                </form>
                
                <div class="divider">
                    <span>or continue with</span>
                </div>
                
                <button class="btn-google" id="googleSignInBtn">
                    <img src="https://www.google.com/favicon.ico" alt="Google" class="google-icon">
                    Continue with Google
                </button>
                
                <p class="signup-link">
                    Don't have an account? <a href="#" id="switchToSignUp">Sign up</a>
                </p>
            </div>
        </div>
    </div>
    
    <!-- Sign Up Modal -->
    <div class="modal-overlay" id="signUpModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Create Account</h3>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <form id="signUpForm" class="signup-form">
                <div class="form-group">
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            id="fullName" 
                            class="form-input" 
                            placeholder="Full Name"
                            required
                        >
                        <i class="bi bi-person input-icon"></i>
                    </div>
                </div>
                
                <div class="form-group">
                    <div class="input-wrapper">
                        <input 
                            type="email" 
                            id="signUpEmail" 
                            class="form-input" 
                            placeholder="Email"
                            required
                        >
                        <i class="bi bi-envelope input-icon"></i>
                    </div>
                </div>
                
                <div class="form-group">
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="signUpPassword" 
                            class="form-input" 
                            placeholder="Password"
                            required
                        >
                        <i class="bi bi-eye-slash input-icon toggle-password" id="toggleSignUpPassword"></i>
                    </div>
                </div>
                
                <div class="form-group">
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            class="form-input" 
                            placeholder="Confirm Password"
                            required
                        >
                        <i class="bi bi-eye-slash input-icon toggle-password" id="toggleConfirmPassword"></i>
                    </div>
                </div>
                
                <button type="submit" class="btn-signin">CREATE ACCOUNT</button>
            </form>
            
            <div class="divider">
                <span>or continue with</span>
            </div>
            
            <button class="btn-google" id="googleSignUpBtn">
                <img src="https://www.google.com/favicon.ico" alt="Google" class="google-icon">
                Continue with Google
            </button>
        </div>
    </div>
    
    <script src="login.js"></script>
</body>
</html>
