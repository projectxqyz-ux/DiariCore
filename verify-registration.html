<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Registration - DiariCore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="verify-registration.css" rel="stylesheet">
</head>
<body>
    <div class="page">
        <div class="top-banner" id="topBanner" hidden>
            <div class="top-banner__content">
                <span>Verification code sent to your email. Please check your inbox.</span>
                <button class="top-banner__close" id="bannerCloseBtn" aria-label="Close">×</button>
            </div>
        </div>

        <div class="card">
            <div class="header">
                <div class="icon">
                    <i class="bi bi-shield-lock"></i>
                </div>
                <h1>Account Verification</h1>
                <p>Enter the 6-digit code sent to your email</p>
            </div>

            <div class="email" id="emailDisplay"></div>

            <div class="otp" id="otpInputs">
                <input class="digit" inputmode="numeric" maxlength="1" aria-label="Digit 1">
                <input class="digit" inputmode="numeric" maxlength="1" aria-label="Digit 2">
                <input class="digit" inputmode="numeric" maxlength="1" aria-label="Digit 3">
                <input class="digit" inputmode="numeric" maxlength="1" aria-label="Digit 4">
                <input class="digit" inputmode="numeric" maxlength="1" aria-label="Digit 5">
                <input class="digit" inputmode="numeric" maxlength="1" aria-label="Digit 6">
            </div>

            <div class="alert alert-error" id="otpError" hidden aria-live="polite">
                <div class="alert__left">
                    <i class="bi bi-exclamation-circle"></i>
                    <span class="alert__text"></span>
                </div>
                <button class="alert__close" id="otpErrorClose" aria-label="Close">×</button>
            </div>

            <button class="btn" id="verifyBtn" disabled>
                <i class="bi bi-check2-circle" id="verifyBtnIcon"></i>
                <span id="verifyBtnText">Verify Code</span>
            </button>

            <div class="meta">
                <button class="link" id="resendBtn">Resend Code</button>
                <div class="timer" id="timerLabel">Code expires in 10:00</div>
            </div>

            <div class="footer">
                <a class="back" href="index.html?mode=signup">
                    <i class="bi bi-arrow-left"></i>
                    Back to registration
                </a>
            </div>
        </div>
    </div>

    <script src="verify-registration.js"></script>
</body>
</html>
