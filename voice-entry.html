<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Entry - DiariCore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="side-bar.css" rel="stylesheet">
    <link href="dashboard.css" rel="stylesheet">
    <link href="voice-entry.css" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <!-- Include Sidebar -->
        <div include-html="side-bar.html"></div>
        
        <!-- Main Content Area - TO BE BUILT STEP BY STEP -->
        <div class="main-content">
            <!-- Desktop Header Section -->
            <div class="header-section">
                <h1 class="main-title">Voice Diary</h1>
                <p class="subtitle">Speak your thoughts naturally</p>
            </div>
            
            <!-- Voice Entry Container -->
            <div class="voice-entry-container">
                <!-- Voice Recording Container -->
                <div class="voice-recording-container">
                    <div class="voice-circle">
                        <i class="bi bi-mic"></i>
                    </div>
                </div>
                
                <!-- Voice Status -->
                <div class="voice-status">
                    <h2>Tap to start recording</h2>
                </div>
                
                <!-- Voice Transcript -->
                <div class="voice-transcript">
                    <h3>Transcript</h3>
                    <p>Your speech will appear here as you speak...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="side-bar.js"></script>
    <script src="voice-entry.js"></script>
</body>
</html>
