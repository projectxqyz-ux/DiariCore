<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insights - DiariCore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="insights.css" rel="stylesheet">
</head>
<body>
    <div class="insights-container">
        <!-- Left Sidebar -->
        <div class="sidebar">
            <div class="logo-section">
                <h3 class="logo-text">DiariCore</h3>
                <p class="logo-tagline">Your mindful journal</p>
            </div>
            
            <nav class="navigation-menu">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="dashboard.html" class="nav-link">
                            <i class="bi bi-house-door"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="write-entry.html" class="nav-link">
                            <i class="bi bi-pencil"></i>
                            <span>Write Entry</span>
                        </a>
                    </li>
                    <li class="nav-item active">
                        <a href="insights.html" class="nav-link">
                            <i class="bi bi-bar-chart"></i>
                            <span>Insights</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">
                            <i class="bi bi-search"></i>
                            <span>Search</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">
                            <i class="bi bi-lightbulb"></i>
                            <span>Suggestions</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">
                            <i class="bi bi-person"></i>
                            <span>Profile</span>
                        </a>
                    </li>
                </ul>
            </nav>
            
            <div class="copyright">
                <p>© 2026 DiariCore</p>
            </div>
        </div>
        
        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Main Content -->
            <main class="insights-content">
                <!-- Weekly Mood Chart -->
                <section class="weekly-mood-section">
                    <div class="section-header">
                        <h2 class="section-title">Weekly Mood Chart</h2>
                    </div>
                    <div class="chart-container">
                        <canvas id="weeklyMoodChart"></canvas>
                    </div>
                </section>

                <!-- Emotion Breakdown -->
                <section class="emotion-breakdown-section">
                    <div class="section-header">
                        <h2 class="section-title">Emotion Breakdown</h2>
                    </div>
                    <div class="emotion-list">
                        <div class="emotion-item">
                            <div class="emotion-info">
                                <h4 class="emotion-name">Happy</h4>
                                <div class="emotion-stats">
                                    <span class="emotion-count">45%</span>
                                    <div class="emotion-bar">
                                        <div class="emotion-progress" style="width: 45%"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="emotion-icon">😊</div>
                        </div>
                        <div class="emotion-item">
                            <div class="emotion-info">
                                <h4 class="emotion-name">Sad</h4>
                                <div class="emotion-stats">
                                    <span class="emotion-count">20%</span>
                                    <div class="emotion-bar">
                                        <div class="emotion-progress" style="width: 20%"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="emotion-icon">😔</div>
                        </div>
                        <div class="emotion-item">
                            <div class="emotion-info">
                                <h4 class="emotion-name">Angry</h4>
                                <div class="emotion-stats">
                                    <span class="emotion-count">10%</span>
                                    <div class="emotion-bar">
                                        <div class="emotion-progress" style="width: 10%"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="emotion-icon">😡</div>
                        </div>
                        <div class="emotion-item">
                            <div class="emotion-info">
                                <h4 class="emotion-name">Anxious</h4>
                                <div class="emotion-stats">
                                    <span class="emotion-count">15%</span>
                                    <div class="emotion-bar">
                                        <div class="emotion-progress" style="width: 15%"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="emotion-icon">😰</div>
                        </div>
                        <div class="emotion-item">
                            <div class="emotion-info">
                                <h4 class="emotion-name">Calm</h4>
                                <div class="emotion-stats">
                                    <span class="emotion-count">10%</span>
                                    <div class="emotion-bar">
                                        <div class="emotion-progress" style="width: 10%"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="emotion-icon">😌</div>
                        </div>
                    </div>
                </section>

                <!-- Activity Impact on Mood -->
                <section class="activity-impact-section">
                    <div class="section-header">
                        <h2 class="section-title">Activity Impact on Mood</h2>
                    </div>
                    <div class="chart-container">
                        <canvas id="activityImpactChart"></canvas>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="insights.js"></script>
</body>
</html>
