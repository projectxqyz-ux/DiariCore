<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Info - DiariCore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="side-bar.css" rel="stylesheet">
    <link href="personal-info.css" rel="stylesheet">
</head>
<body class="page-personal-info has-mobile-app-topbar">
    <div class="personal-info-container">
        <div class="main-content">
            <main class="personal-info-content">
                <section class="personal-info-shell">
                    <header class="personal-info-header">
                        <button type="button" class="back-btn" id="backToProfileBtn">
                            <i class="bi bi-arrow-left"></i>
                            <span>Back to Profile</span>
                        </button>
                        <div class="header-copy">
                            <h1 class="main-title">Personal Information</h1>
                            <p class="subtitle">Manage your identity and account details in one place.</p>
                        </div>
                        <div class="header-badge">
                            <i class="bi bi-shield-check"></i>
                            <span>Secure</span>
                        </div>
                    </header>

                    <form id="personalInfoForm" novalidate>
                        <div class="settings-layout">
                            <section class="settings-card">
                                <div class="section-heading">
                                    <h3>Account</h3>
                                    <p>Login and contact details</p>
                                </div>
                                <div class="form-grid">
                                    <div class="form-group">
                                        <label for="personalInfoNickname">Username</label>
                                        <input type="text" id="personalInfoNickname" class="form-control" required minlength="4" maxlength="64">
                                    </div>
                                    <div class="form-group">
                                        <label for="personalInfoEmail">Email</label>
                                        <input type="email" id="personalInfoEmail" class="form-control" required maxlength="120">
                                    </div>
                                </div>
                            </section>

                            <section class="settings-card">
                                <div class="section-heading">
                                    <h3>Profile</h3>
                                    <p>Your personal details</p>
                                </div>
                                <div class="form-grid">
                                    <div class="form-group">
                                        <label for="personalInfoFirstName">First Name</label>
                                        <input type="text" id="personalInfoFirstName" class="form-control" required maxlength="64">
                                    </div>
                                    <div class="form-group">
                                        <label for="personalInfoLastName">Last Name</label>
                                        <input type="text" id="personalInfoLastName" class="form-control" required maxlength="64">
                                    </div>
                                    <div class="form-group">
                                        <label for="personalInfoGender">Gender</label>
                                        <select id="personalInfoGender" class="form-control" required>
                                            <option value="" selected disabled hidden>Select gender</option>
                                            <option value="Male">Male</option>
                                            <option value="Female">Female</option>
                                            <option value="Prefer not to say">Prefer not to say</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label for="personalInfoBirthday">Date of Birth</label>
                                        <input type="date" id="personalInfoBirthday" class="form-control" required>
                                    </div>
                                </div>
                            </section>
                        </div>

                        <div class="actions-row">
                            <button type="button" class="btn-cancel" id="cancelEditBtn">Cancel</button>
                            <button type="submit" class="btn-save" id="personalInfoSaveBtn">Save Changes</button>
                        </div>
                    </form>
                </section>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="side-bar.js"></script>
    <script src="personal-info.js"></script>
</body>
</html>
