<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write Entry - DiariCore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="side-bar.css" rel="stylesheet">
    <link href="dashboard.css" rel="stylesheet">
    <link href="write-entry.css" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Mobile Header Section -->
            <div class="mobile-header">
                <button class="back-btn" onclick="window.location.href='dashboard.html'">
                    <i class="bi bi-arrow-left"></i>
                </button>
                <h1 class="mobile-title">New Entry</h1>
                <button class="save-btn" id="saveEntryBtn">
                    <i class="bi bi-check"></i>
                    Save
                </button>
            </div>
            
            <!-- Desktop Header Section (hidden on mobile) -->
            <div class="header-section">
                <h1 class="main-title">Write Your Entry</h1>
                <p class="subtitle">Express your thoughts and feelings</p>
            </div>
            
            <!-- Feelings Selection Section -->
            <div class="feelings-section">
                <h2 class="section-title">How are you feeling?</h2>
                <div class="feelings-grid">
                    <div class="feeling-card" data-feeling="happy">
                        <div class="feeling-icon">
                            <i class="bi bi-emoji-smile"></i>
                        </div>
                        <span class="feeling-label">Happy</span>
                    </div>
                    <div class="feeling-card" data-feeling="sad">
                        <div class="feeling-icon">
                            <i class="bi bi-emoji-frown"></i>
                        </div>
                        <span class="feeling-label">Sad</span>
                    </div>
                    <div class="feeling-card" data-feeling="stressed">
                        <div class="feeling-icon">
                            <i class="bi bi-emoji-dizzy"></i>
                        </div>
                        <span class="feeling-label">Stressed</span>
                    </div>
                    <div class="feeling-card" data-feeling="neutral">
                        <div class="feeling-icon">
                            <i class="bi bi-emoji-neutral"></i>
                        </div>
                        <span class="feeling-label">Neutral</span>
                    </div>
                </div>
            </div>
            
            <!-- Tags Section -->
            <div class="tags-section">
                <h2 class="section-title">Add Tags</h2>
                <div class="tags-container">
                    <button class="tag-btn" data-tag="School">
                        <i class="bi bi-book"></i>
                        <span>School</span>
                    </button>
                    <button class="tag-btn" data-tag="Home">
                        <i class="bi bi-house"></i>
                        <span>Home</span>
                    </button>
                    <button class="tag-btn" data-tag="Friends">
                        <i class="bi bi-people"></i>
                        <span>Friends</span>
                    </button>
                    <button class="tag-btn" data-tag="Family">
                        <i class="bi bi-heart"></i>
                        <span>Family</span>
                    </button>
                    <button class="tag-btn" data-tag="Work">
                        <i class="bi bi-briefcase"></i>
                        <span>Work</span>
                    </button>
                    <button class="tag-btn" data-tag="Health">
                        <i class="bi bi-heart-pulse"></i>
                        <span>Health</span>
                    </button>
                    <button class="tag-btn" data-tag="Hobbies">
                        <i class="bi bi-palette"></i>
                        <span>Hobbies</span>
                    </button>
                    <button class="tag-btn add-tag">
                        <i class="bi bi-plus"></i>
                        <span>Add Tag</span>
                    </button>
                </div>
            </div>
            
            <!-- Journal Input Section -->
            <div class="journal-input-section">
                <h2 class="section-title">Your Thoughts</h2>
                <div class="journal-container">
                    <div class="journal-header">
                        <div class="character-counter">
                            <span id="charCount">0</span> characters
                        </div>
                        <button class="voice-input-btn" id="voiceInputBtn">
                            <i class="bi bi-mic"></i>
                            Voice Input
                        </button>
                    </div>
                    <textarea 
                        id="journalText"
                        class="journal-textarea" 
                        placeholder="Start writing..."
                        maxlength="5000"
                    ></textarea>
                </div>
            </div>
            
            <!-- Action Buttons -->
            <div class="action-buttons-section">
                <button class="btn-save-entry" id="saveEntryBtn">
                    <i class="bi bi-check-circle"></i>
                    Save Entry
                </button>
                <button class="btn-cancel" id="cancelBtn">
                    <i class="bi bi-x-circle"></i>
                    Cancel
                </button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="side-bar.js"></script>
    <script src="write-entry.js"></script>
</body>
</html>
