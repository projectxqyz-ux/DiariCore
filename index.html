<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - DiariCore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="login.css" rel="stylesheet">
</head>
<body>
    <div class="login-container" id="loginContainer">
        <!-- Left Side - Forms -->
        <div class="login-left-panel">
            <!-- Sign In Form -->
            <div class="form-section signin-section" id="signinSection">
                <div class="form-header">
                    <h2 class="form-title">Sign In to DiariCore</h2>
                    <p class="form-subtitle">Continue your journaling journey with mindful insights.</p>
                </div>
                
                <form id="loginForm" class="login-form" novalidate>
                    <div class="form-group">
                        <div class="input-wrapper" data-label="Username">
                            <input 
                                type="text" 
                                id="email" 
                                class="form-input" 
                                placeholder=" "
                                required
                            >
                            <span class="floating-label">Username</span>
                            <i class="bi bi-person input-icon"></i>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <div class="input-wrapper" data-label="Password">
                            <input 
                                type="password" 
                                id="password" 
                                class="form-input" 
                                placeholder=" "
                                required
                            >
                            <span class="floating-label">Password</span>
                            <i class="bi bi-eye-slash input-icon toggle-password" id="togglePassword"></i>
                        </div>
                    </div>
                    
                    <div class="form-options">
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>
                    
                    <button type="submit" class="btn-signin">SIGN IN</button>
                </form>
                
                <div class="divider">
                    <span>or continue with</span>
                </div>
                
                <button class="btn-google" id="googleSignInBtn">
                    <img src="https://www.google.com/favicon.ico" alt="Google" class="google-icon">
                    Continue with Google
                </button>
                
                <p class="signup-link mobile-only">
                    Don't have an account? <a href="register.html">Sign up</a>
                </p>
            </div>
        </div>
        
        <!-- Right Side - Sliding Panel -->
        <div class="login-right-panel" id="slidingPanel">
            <div class="logo-section">
                <img src="dclogo.png" alt="DiariCore Logo" class="login-logo">
            </div>
            
            <div class="welcome-content signin-welcome" id="signinWelcome">
                <h1 class="welcome-title">Welcome Back!</h1>
                <p class="welcome-text">To stay connected with DiariCore, login with your personal info.</p>
                <a href="register.html" class="btn-switch">SIGN UP</a>
            </div>
        </div>
    </div>
    
    <script src="login.js"></script>
</body>
</html>
